default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
<% if ENV["POSTGRES_USER"] || ENV["PGUSER"] %>
  username: <%= ENV["POSTGRES_USER"] || ENV["PGUSER"] %>
<% end %>
<% if ENV["POSTGRES_PASSWORD"] || ENV["PGPASSWORD"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] || ENV["PGPASSWORD"] %>
<% end %>
<% if ENV["POSTGRES_HOST"] || ENV["PGHOST"] %>
  host: <%= ENV["POSTGRES_HOST"] || ENV["PGHOST"] %>
<% end %>
<% if ENV["POSTGRES_PORT"] || ENV["PGPORT"] %>
  port: <%= ENV["POSTGRES_PORT"] || ENV["PGPORT"] %>
<% end %>

development:
  primary:
    <<: *default
    database: star_trader_development
  cable:
    <<: *default
    database: star_trader_development
    schema_search_path: "cable,public"
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
<% if ENV["DATABASE_URL"] %>
    url: <%= ENV["DATABASE_URL"] %>
<% else %>
    database: <%= ENV.fetch("POSTGRES_TEST_DB", "star_trader_test") %>
<% end %>
  cable:
    <<: *default
<% if ENV["DATABASE_URL"] %>
    url: <%= ENV["DATABASE_URL"] %>
<% else %>
    database: <%= ENV.fetch("POSTGRES_TEST_DB", "star_trader_test") %>
<% end %>
    schema_search_path: "cable,public"
    migrations_paths: db/cable_migrate

production:
  primary:
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  cable:
    url: <%= ENV["DATABASE_URL"] %>
    schema_search_path: "cable,public"
    migrations_paths: db/cable_migrate
